name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write


jobs:

  build:

    name: Build package

    runs-on: ubuntu-latest


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.13"


      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build


      - name: Build package
        run: |
          python -m build


      - name: Check package
        run: |
          pip install twine
          twine check dist/*


      - name: Upload artifact
        uses: actions/upload-artifact@v4

        with:
          name: package
          path: dist/


  publish:

    name: Publish to PyPI

    needs: build

    runs-on: ubuntu-latest


    environment:
      name: pypi
      url: https://pypi.org/p/moex-iss


    permissions:
      id-token: write


    steps:

      - name: Download package
        uses: actions/download-artifact@v4

        with:
          name: package
          path: dist/


      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2

        with:
          generate_release_notes: true