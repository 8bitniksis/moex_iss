name: MOEX ISS CI


on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main


jobs:

  test:

    name: Test Python ${{ matrix.python-version }}

    runs-on: ubuntu-latest


    strategy:

      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"


    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5

      with:
        python-version: ${{ matrix.python-version }}


    - name: Upgrade pip

      run:

        python -m pip install --upgrade pip


    - name: Install dependencies

      run:

        pip install -r requirements-dev.txt


    - name: Install package

      run:

        pip install -e .


    - name: Ruff lint

      run:

        ruff check .


    - name: Black check

      run:

        black --check .


    - name: MyPy

      run:

        mypy moex_iss


    - name: Run tests

      run:

        pytest \
        --cov=moex_iss \
        --cov-report=xml \
        --cov-report=term


    - name: Upload coverage

      uses: codecov/codecov-action@v4

      with:

        file: ./coverage.xml