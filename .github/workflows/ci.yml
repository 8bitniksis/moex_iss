name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main


jobs:

  quality:

    name: Code Quality

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version:
          - "3.13"
          - "3.14"


    steps:

      - name: Checkout

        uses: actions/checkout@v4


      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: ${{ matrix.python-version }}


      - name: Install

        run:

          python -m pip install --upgrade pip

          pip install -e ".[dev,test]"


      - name: Ruff

        run:

          ruff check .


      - name: Format

        run:

          ruff format --check .


      - name: Tests

        run:

          pytest \
          --cov=moex_iss \
          --cov-report=term-missing