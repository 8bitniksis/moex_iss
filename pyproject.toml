[build-system]
requires = [
    "setuptools>=68",
    "wheel"
]
build-backend = "setuptools.build_meta"


[project]
name = "moex-iss"
version = "1.0.0"
description = "Modern Python client for Moscow Exchange ISS API"
authors = [
    {name="MOEX ISS Quant Tools"}
]

requires-python = ">=3.11"

dependencies = [
    "requests>=2.31",
    "httpx>=0.27",
    "pandas>=2.2",
    "pydantic>=2.7",
    "tenacity>=8.2",
    "python-dotenv>=1.0"
]


[project.optional-dependencies]

test = [
    "pytest>=8",
    "pytest-cov",
    "pytest-asyncio"
]


dev = [
    "black",
    "ruff",
    "mypy"
]