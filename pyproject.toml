[project]

name = "moex-iss"

version = "1.0.0"

description = "Modern Python client for Moscow Exchange ISS API"

requires-python = ">=3.14"


dependencies = [
    "requests>=2.32",
    "httpx>=0.28",
    "pandas>=2.3",
    "numpy>=2.0",
    "pyarrow>=17",
    "pydantic>=2.10",
    "tenacity>=9",
    "python-dotenv>=1.0"
]


[tool.black]

line-length = 88

target-version = [
    "py314"
]


[tool.ruff]

target-version = "py314"

line-length = 88


[tool.mypy]

python_version = "3.14"

strict = true