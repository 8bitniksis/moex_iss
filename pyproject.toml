[build-system]
requires = [
    "setuptools>=68",
    "wheel"
]
build-backend = "setuptools.build_meta"


[project]
name = "moex-iss"
version = "1.0.0"
description = "Modern Python client for Moscow Exchange ISS API"

authors = [
    {name="MOEX ISS Quant Tools"}
]

requires-python = ">=3.11"


dependencies = [
    "requests>=2.31",
    "httpx>=0.27",
    "pandas>=2.2",
    "numpy>=1.26",
    "pyarrow>=16",
    "pydantic>=2.7",
    "tenacity>=8.2",
    "python-dotenv>=1.0"
]


[project.optional-dependencies]

test = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-asyncio>=0.23"
]


dev = [
    "black>=24",
    "ruff>=0.5",
    "mypy>=1.10",
    "build>=1.2"
]


quant = [
    "scipy>=1.12",
    "scikit-learn>=1.4",
    "statsmodels>=0.14",
    "arch>=7.0",
    "catboost>=1.2",
    "optuna>=3.6"
]


[tool.black]

line-length = 88

target-version = [
    "py311"
]


[tool.ruff]

target-version = "py311"

line-length = 88


[tool.ruff.lint]

select = [
    "E",
    "F",
    "I"
]


[tool.ruff.format]

quote-style = "double"


[tool.mypy]

python_version = "3.11"

strict = true

ignore_missing_imports = true


[tool.pytest.ini_options]

testpaths = [
    "tests"
]

addopts = [
    "-ra",
    "--strict-markers"
]


[tool.coverage.run]

branch = true

source = [
    "moex_iss"
]


[tool.coverage.report]

exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING"
]